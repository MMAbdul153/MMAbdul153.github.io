<!DOCTYPE html>
<html>
  <head>
    <title>Musa Abdulrafiu - Resume</title>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; }
      iframe { width: 100vw; height: 100vh; border: none; }
    </style>
  </head>
  <body>
    <iframe id="resume-frame"></iframe>
    
    <script>
      // 1. Generates a unique number based on the current exact millisecond
      const cacheBuster = new Date().getTime();
      
      // 2. Tells the iframe to load your specifically named PDF with the cache buster
      document.getElementById('resume-frame').src = "Musa_Abdulrafiu_resume.pdf?v=" + cacheBuster;
    </script>
  </body>
</html>
